# API/Worker 프로세스 분리 — 단일 Docker 이미지 + SERVICE_MODE env 분기.
#
# 운영 예시:
#   docker compose up                          # api=1, worker=1, redis=1
#   docker compose up --scale worker=5 -d     # 워커 수평 확장
#
# api 와 worker 는 동일 이미지(packages/demo/Dockerfile)를 공유하며 SERVICE_MODE
# 환경변수로 모드를 분기한다(packages/demo/src/server.ts).
services:
  redis:
    image: redis:7-alpine
    container_name: webhook-relay-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/demo/Dockerfile
      args:
        # C11 build_info 의 git_commit 라벨. 호스트 셸에서
        # `GIT_COMMIT=$(git rev-parse HEAD) docker compose build` 로 주입.
        # 부재 시 "unknown" 으로 fallback (운영자가 잊어도 빌드는 통과).
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: webhook-relay-api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SERVICE_MODE: api
      # 컨테이너 네트워크에서 redis 서비스 호스트 사용.
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      LOG_LEVEL: info
      # 결정 잠금 Q-API-1 (b): 필수 시크릿. compose 사용자는 .env 또는 셸에서 주입.
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:?Set API_BEARER_TOKEN (>=32 bytes) in .env or shell}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:?Set WEBHOOK_HMAC_SECRET (>=32 bytes) in .env or shell}
      # 결정 잠금 Q-SEC-1 (b): 데모 동작 보장 위해 true.
      ALLOW_PRIVATE_TARGETS: "true"
      WEBHOOK_MAX_PAYLOAD_BYTES: "65536"
      WEBHOOK_DELIVERY_TIMEOUT_MS: "5000"
      QUEUE_NAME: webhook-delivery
      DLQ_NAME: webhook-delivery-dlq
      WORKER_CONCURRENCY: "5"
      REDIS_RECONNECT_BASE_MS: "200"
      REDIS_RECONNECT_MAX_MS: "10000"
      # 2단계 키(기본값 명시; M2 에서는 사용 제한적).
      WEBHOOK_MAX_ATTEMPTS: "5"
      WEBHOOK_BACKOFF_BASE_MS: "1000"
      WEBHOOK_HMAC_HEADER: X-Webhook-Signature
      STALLED_INTERVAL_MS: "30000"
      MAX_STALLED_COUNT: "1"
      SHUTDOWN_TIMEOUT_MS: "30000"
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    # api 와 동일 이미지. container_name 은 --scale 충돌 회피를 위해 미지정.
    build:
      context: .
      dockerfile: packages/demo/Dockerfile
      args:
        # C11 build_info 의 git_commit 라벨. api 와 동일 값.
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SERVICE_MODE: worker
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      # api 와 동일한 시크릿/큐/재시도 설정 — 같은 큐를 소비해야 하므로 같은 값.
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:?Set API_BEARER_TOKEN (>=32 bytes) in .env or shell}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:?Set WEBHOOK_HMAC_SECRET (>=32 bytes) in .env or shell}
      ALLOW_PRIVATE_TARGETS: "true"
      WEBHOOK_MAX_PAYLOAD_BYTES: "65536"
      WEBHOOK_DELIVERY_TIMEOUT_MS: "5000"
      QUEUE_NAME: webhook-delivery
      DLQ_NAME: webhook-delivery-dlq
      WORKER_CONCURRENCY: "5"
      REDIS_RECONNECT_BASE_MS: "200"
      REDIS_RECONNECT_MAX_MS: "10000"
      WEBHOOK_MAX_ATTEMPTS: "5"
      WEBHOOK_BACKOFF_BASE_MS: "1000"
      WEBHOOK_HMAC_HEADER: X-Webhook-Signature
      STALLED_INTERVAL_MS: "30000"
      MAX_STALLED_COUNT: "1"
      SHUTDOWN_TIMEOUT_MS: "30000"
      # Q-OBS-3 (a) — worker 모드도 최소 Fastify 인스턴스에 `/metrics` 노출.
      # Prometheus 가 docker-compose 네트워크에서 worker:3001/metrics 를 scrape.
      WORKER_METRICS_PORT: "3001"
    # 호스트 3001 → 컨테이너 3001 매핑. Prometheus 가 컨테이너 네트워크로
    # worker:3001 scrape + 운영자가 호스트에서 `curl http://localhost:3001/metrics`
    # 로 직접 확인 가능. Grafana 의 호스트 포트는 충돌 회피를 위해 3002 로 이동.
    # `docker compose up --scale worker=N` 시 첫 인스턴스만 호스트 3001 에 매핑되고,
    # 추가 인스턴스는 동적 포트로 폴백된다 — Prometheus scrape 는 영향 없음.
    ports:
      - "3001:3001"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: webhook-relay-prometheus
    ports:
      - "9090:9090"
    volumes:
      # PRD `prd-phase3/03` §3.1 — 명세된 4종 마운트.
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
    depends_on:
      - api
      - worker
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: webhook-relay-grafana
    ports:
      # 호스트 3002 → 컨테이너 3000. worker 의 `/metrics` 가 호스트 3001 을
      # 차지하므로(운영자 직접 확인용) Grafana 는 3002 로 이동. README "빠른
      # 시작" + PRD `prd-phase3/03` §3.1 도 동일.
      - "3002:3000"
    volumes:
      # PRD `prd-phase3/03` §3.1 — 명세된 4종 마운트.
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # Q-OBS-4 (a) — 데모 admin/admin. 외부 노출 전 변경 권장(README 운영 노트).
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    restart: unless-stopped
