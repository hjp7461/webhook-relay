# API/Worker 프로세스 분리 — 단일 Docker 이미지 + SERVICE_MODE env 분기.
#
# 운영 예시:
#   docker compose up                          # api=1, worker=1, redis=1
#   docker compose up --scale worker=5 -d     # 워커 수평 확장
#
# api 와 worker 는 동일 이미지(packages/demo/Dockerfile)를 공유하며 SERVICE_MODE
# 환경변수로 모드를 분기한다(packages/demo/src/server.ts).
services:
  redis:
    image: redis:7-alpine
    container_name: webhook-relay-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: packages/demo/Dockerfile
      args:
        # C11 build_info 의 git_commit 라벨. 호스트 셸에서
        # `GIT_COMMIT=$(git rev-parse HEAD) docker compose build` 로 주입.
        # 부재 시 "unknown" 으로 fallback (운영자가 잊어도 빌드는 통과).
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    container_name: webhook-relay-api
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SERVICE_MODE: api
      # 컨테이너 네트워크에서 redis 서비스 호스트 사용.
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      LOG_LEVEL: info
      # 결정 잠금 Q-API-1 (b): 필수 시크릿. compose 사용자는 .env 또는 셸에서 주입.
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:?Set API_BEARER_TOKEN (>=32 bytes) in .env or shell}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:?Set WEBHOOK_HMAC_SECRET (>=32 bytes) in .env or shell}
      # 결정 잠금 Q-SEC-1 (b): 데모 동작 보장 위해 true.
      ALLOW_PRIVATE_TARGETS: "true"
      WEBHOOK_MAX_PAYLOAD_BYTES: "65536"
      WEBHOOK_DELIVERY_TIMEOUT_MS: "5000"
      QUEUE_NAME: webhook-delivery
      DLQ_NAME: webhook-delivery-dlq
      WORKER_CONCURRENCY: "5"
      REDIS_RECONNECT_BASE_MS: "200"
      REDIS_RECONNECT_MAX_MS: "10000"
      # 2단계 키(기본값 명시; M2 에서는 사용 제한적).
      WEBHOOK_MAX_ATTEMPTS: "5"
      WEBHOOK_BACKOFF_BASE_MS: "1000"
      WEBHOOK_HMAC_HEADER: X-Webhook-Signature
      STALLED_INTERVAL_MS: "30000"
      MAX_STALLED_COUNT: "1"
      SHUTDOWN_TIMEOUT_MS: "30000"
    ports:
      - "3000:3000"
    # k6.depends_on.api.condition: service_healthy 를 만족시키기 위한 healthcheck.
    # /healthz 가 1~2단계의 단일 출처 readiness probe. node fetch 사용으로
    # 베이스 이미지(node:22-alpine) 안의 추가 의존성(curl/wget) 없이 동작.
    # M-LOAD-2 단계 4 측정에서 본 healthcheck 누락이 docker compose run k6
    # 즉시 실패의 직접 원인이었음 — M-LOAD-1 산출물의 실효 검증 누락 fix.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    # api 와 동일 이미지. container_name 은 --scale 충돌 회피를 위해 미지정.
    build:
      context: .
      dockerfile: packages/demo/Dockerfile
      args:
        # C11 build_info 의 git_commit 라벨. api 와 동일 값.
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SERVICE_MODE: worker
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
      # api 와 동일한 시크릿/큐/재시도 설정 — 같은 큐를 소비해야 하므로 같은 값.
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:?Set API_BEARER_TOKEN (>=32 bytes) in .env or shell}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET:?Set WEBHOOK_HMAC_SECRET (>=32 bytes) in .env or shell}
      ALLOW_PRIVATE_TARGETS: "true"
      WEBHOOK_MAX_PAYLOAD_BYTES: "65536"
      WEBHOOK_DELIVERY_TIMEOUT_MS: "5000"
      QUEUE_NAME: webhook-delivery
      DLQ_NAME: webhook-delivery-dlq
      WORKER_CONCURRENCY: "5"
      REDIS_RECONNECT_BASE_MS: "200"
      REDIS_RECONNECT_MAX_MS: "10000"
      WEBHOOK_MAX_ATTEMPTS: "5"
      WEBHOOK_BACKOFF_BASE_MS: "1000"
      WEBHOOK_HMAC_HEADER: X-Webhook-Signature
      STALLED_INTERVAL_MS: "30000"
      MAX_STALLED_COUNT: "1"
      SHUTDOWN_TIMEOUT_MS: "30000"
      # Q-OBS-3 (a) — worker 모드도 최소 Fastify 인스턴스에 `/metrics` 노출.
      # Prometheus 가 docker-compose 네트워크에서 worker:3001/metrics 를 scrape.
      WORKER_METRICS_PORT: "3001"
    # 호스트 포트 매핑 없음 (M-LOAD-5 N=2 1차 시도 fail 대응, 2026-05-28).
    # `docker compose up --scale worker=N` 시 호스트 3001 단일 매핑이라 두번째
    # 인스턴스 부트 시 `Bind for 0.0.0.0:3001 failed: port is already allocated`
    # 발화로 전체 fail. PRD `prd-phase4/04` §R4.18 의 "동적 폴백" 가정이 잘못
    # 됐음이 검증된 commit (사용자 결정 2026-05-28 잠금).
    # Prometheus scrape 는 컨테이너 네트워크 `worker:3001` (`WORKER_METRICS_PORT`)
    # 으로 docker-compose service DNS round-robin 동작 — N 인스턴스 사이
    # round-robin 으로 매 scrape 마다 1 인스턴스 응답 (한계 보고서에 명시).
    # 호스트에서 worker /metrics 직접 확인이 필요하면
    # `docker compose exec worker curl -sf http://localhost:3001/metrics`.
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: webhook-relay-prometheus
    ports:
      - "9090:9090"
    volumes:
      # PRD `prd-phase3/03` §3.1 — 명세된 4종 마운트.
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro
    # 4단계 부하 측정의 k6 metric 누적을 위해 remote write receiver 활성화
    # (PRD `prd-phase4/02` §2.2, M-LOAD-1 단계 2). image 의 default CMD
    # (`--config.file` + `--storage.tsdb.path=/prometheus`) 를 그대로 보존하고
    # receiver 플래그만 1건 추가 — compose `command:` 가 image CMD 를 완전히
    # override 하므로 default 인자를 명시적으로 재선언한다.
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    depends_on:
      - api
      - worker
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: webhook-relay-grafana
    ports:
      # 호스트 3002 → 컨테이너 3000. worker 의 `/metrics` 가 호스트 3001 을
      # 차지하므로(운영자 직접 확인용) Grafana 는 3002 로 이동. README "빠른
      # 시작" + PRD `prd-phase3/03` §3.1 도 동일.
      - "3002:3000"
    volumes:
      # PRD `prd-phase3/03` §3.1 — 명세된 4종 마운트.
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      # Q-OBS-4 (a) — 데모 admin/admin. 외부 노출 전 변경 권장(README 운영 노트).
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    restart: unless-stopped

  # 4단계 부하 측정 도구. Q-LOAD-1 (a) k6 잠금 + Q-LOAD-2 (b) cgroup 격리 잠금
  # (PRD `prd-phase4/02` §2 + §3 + §4). profiles=["measure"] 가 일반 `docker
  # compose up` 에서 본 서비스를 비실행으로 분리 — 5 서비스(redis/api/worker/
  # prometheus/grafana) 의 기존 운영 톤을 보존한다. M-LOAD-1 은 부트스트랩만
  # 잠그며 실제 LP-N 측정은 M-LOAD-2~6 책임.
  k6:
    image: grafana/k6:latest
    container_name: webhook-relay-k6
    depends_on:
      api:
        # api 가 헬스체크 통과 후 부하 인가 (PRD `02` §3.1 정합).
        condition: service_healthy
      worker:
        # worker 가 첫 인스턴스 기동 후. --scale worker=N 시 N-1 추가 인스턴스는
        # 같은 docker network 에 합류한 상태에서 k6 가 시작.
        condition: service_started
    volumes:
      # LP-1~LP-4 시나리오 파일은 M-LOAD-2~4 에서 채움. 본 마일스톤은 자리 잠금.
      - ./docker/k6/scenarios:/scenarios:ro
      # Q-LOAD-12 (a) Markdown 표 결정 — 결과는 `docs/prd-phase4/results/` 가
      # 단일 출처(I4.10). 본 볼륨은 k6 의 raw output 임시 보관(필요 시 사용).
      - ./docker/k6/results:/results
    environment:
      # 컨테이너 네트워크에서 api 호스트 직접 접근 — 호스트 NAT 우회로 측정
      # 정확도 보호 (PRD `02` §3.3 + I4.11).
      K6_TARGET_URL: http://api:3000/webhooks
      # api/worker 와 동일한 Bearer 시크릿. compose 사용자가 .env 또는 셸에서 주입.
      K6_API_BEARER_TOKEN: ${API_BEARER_TOKEN:?Set API_BEARER_TOKEN (>=32 bytes) in .env or shell}
      # k6 측정 메트릭(`k6_http_*`)을 동일 Prometheus 인스턴스에 누적
      # (PRD `02` §2.2). 단계 2 에서 prometheus 의 remote write receiver 활성화.
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
    deploy:
      resources:
        # PRD `02` §4.2 잠정 한정값 — 부하 인가 측에 CPU 여유 확보로 RPS 정확도
        # 보호 (I4.8, ±5% 허용 오차 §7.2). 호스트 사양 호환성은 §4 단계 6 체크.
        limits:
          cpus: "2.0"
          memory: 1G
    # 기본 비실행. 측정 시: `docker compose --profile measure up k6`.
    profiles: ["measure"]
