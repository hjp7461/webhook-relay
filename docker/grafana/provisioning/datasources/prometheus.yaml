# Grafana datasource provisioning — Prometheus.
#
# PRD `prd-phase3/03-grafana-dashboards.md` §5.1, PLAN `05` §4 step 3.
#
# - editable: false → GUI 에서 datasource 직접 변경 차단 (I5.1, AC5.5).
# - url: http://prometheus:9090 → docker-compose 네트워크 호스트명.
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
