# Grafana dashboards provider — file-based provisioning.
#
# PRD `prd-phase3/03-grafana-dashboards.md` §5.2, PLAN `05` §4 step 3.
#
# - allowUiUpdates: false → GUI 에서 직접 저장 차단(PR 기반 워크플로우 유지,
#   I5.1, AC5.5).
# - updateIntervalSeconds: 30 → dashboards/ 디렉터리의 JSON 변경 시 30s 내 반영.
# - options.path → 컨테이너 내 마운트 경로(docker-compose 마운트 정합).
apiVersion: 1
providers:
  - name: webhook-relay
    orgId: 1
    folder: ""
    type: file
    disableDeletion: true
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
