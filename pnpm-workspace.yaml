packages:
  - "packages/*"

# vitest transitive 의존성 esbuild 의 post-install 빌드 스크립트 실행 허용.
# pnpm 의 보수적 정책상 명시적으로 true 로 켠다.
allowBuilds:
  esbuild: true
  # bullmq → msgpackr → msgpackr-extract 의 네이티브 빌드 허용. 실패해도 JS fallback 동작.
  msgpackr-extract: true
  # testcontainers 가 transitive 로 끌고 오는 빌드 스크립트들은 본 프로젝트에서 사용하지 않는다.
  # JS fallback 으로 동작하므로 빌드 스크립트 실행을 거부한다.
  cpu-features: false
  protobufjs: false
  ssh2: false
